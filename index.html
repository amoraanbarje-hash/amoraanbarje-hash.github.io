<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطبخ الشيف قمر | Chef Qamar's Kitchen</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fcf9f2; margin: 0; padding: 0; text-align: center; color: #3d2514; }
        header { background-color: #ffffff; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .logo { font-size: 24px; font-weight: bold; color: #3d2514; }
        .btn-order { background-color: #e6a100; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; position: absolute; left: 20px; top: 15px; }
        .hero { padding: 60px 20px; background-image: radial-gradient(#d3c3b3 1px, transparent 1px); background-size: 20px 20px; }
        .hero h1 { font-size: 48px; color: #3d2514; margin-bottom: 20px; line-height: 1.3; }
        .food-img { width: 100%; max-width: 500px; border-radius: 10px; margin-top: 20px; }
        .description { padding: 40px 20px; font-size: 20px; line-height: 1.6; max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="btn-order">اطلب الآن</a>
        <div class="logo">مطبخ الشيف قمر</div>
    </header>

    <div class="hero">
        <h1>طعم بياخدك<br>لبيت العيلة!</h1>
        <img src="https://unsplash.com" alt="كبة مقلية" class="food-img">
    </div>

    <div class="description">
        طبخ شرقي بيتوتي أصيل، محضر بحب وعناية. كبب، مناسف، ويبرق على أصوله.
    </div>

</
</html>
